<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00b8d9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- WiFi arc 1 (largest) -->
  <path d="M18 48 Q50 18 82 48" stroke="url(#wave)" stroke-width="5" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" begin="0s" repeatCount="indefinite"/>
  </path>

  <!-- WiFi arc 2 (medium) -->
  <path d="M28 57 Q50 35 72 57" stroke="url(#wave)" stroke-width="5" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- WiFi arc 3 (small) -->
  <path d="M38 66 Q50 53 62 66" stroke="url(#wave)" stroke-width="5" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- WiFi dot -->
  <circle cx="50" cy="78" r="5" fill="#00d9ff">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
</svg>
