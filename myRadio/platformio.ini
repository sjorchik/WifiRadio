; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.filesystem = spiffs
board_build.partitions = huge_app.csv
board_build.stack_size = 8192
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER
    -D TFT_WIDTH=170
    -D TFT_HEIGHT=320
    -D TFT_DC=16
    -D TFT_RST=17
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_BL=4
    -D TFT_RGB_ORDER=TFT_BGR
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF
    -D SMOOTH_FONT
    -D SPI_FREQUENCY=80000000
    -D USE_HSPI_PORT
lib_deps =
    bblanchon/ArduinoJson@^6.18.3
    esphome/ESP32-audioI2S@^2.3.0
    ESPmDNS
    bodmer/TFT_eSPI@^2.5.43
    igorantolic/Ai Esp32 Rotary Encoder@^1.4.2
    mathertel/OneButton
    IRremoteESP8266

; Для завантаження SPIFFS: pio run -t uploadfs
